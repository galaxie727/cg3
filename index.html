<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>チーと言えばギュウと答える</title>

<style>
*{box-sizing:border-box}
:root{
  --maxw:560px;
  --pad:16px;
  --stroke:rgba(255,255,255,.55);
  --iconFrame:8px;
  --iconRadius:14px;
}
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Noto Sans JP",sans-serif;
}
.app{
  max-width:var(--maxw);
  margin:0 auto;
  min-height:100svh;
  display:flex;
  flex-direction:column;
}
header{
  padding:12px 16px;
  display:flex;
  justify-content:space-between;
  font-size:12px;
  font-weight:800;
  letter-spacing:.08em;
  opacity:.95;
}

.screen{flex:1;position:relative;overflow:hidden}
.hide{display:none!important}
.bg{
  position:absolute; inset:0;
  background-size:cover;
  background-position:center;
  transform:scale(1.02);
  transition:transform .35s ease, filter .35s ease;
}
.overlay{
  position:absolute; inset:0;
  padding:var(--pad);
  display:flex;
}

.panel{
  width:100%;
  text-align:center;
  text-shadow:0 10px 28px rgba(0,0,0,.80);
}
.titleBig{
  font-size:22px;
  font-weight:900;
  letter-spacing:.14em;
  margin:0 0 14px;
}
.subLine{
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
  opacity:.95;
  margin:0 0 16px;
}
.bigBtn{
  width:min(360px, 92%);
  font-size:18px;
  padding:16px 18px;
  border:none;
  border-radius:16px;
  background:#ffffff22;
  color:#fff;
  font-weight:900;
}

/* TOP：ボタンを下へ */
#topScreen .bg{ background-image:url("top_keyvisual_01.png"); }
#topScreen .overlay{
  justify-content:flex-end;
  align-items:center;
  padding-bottom:clamp(130px, 18vh, 210px);
}
#topScreen .panel{
  background:rgba(0,0,0,.14);
  border-radius:18px;
  padding:16px 12px;
  backdrop-filter: blur(2px);
}
#versionTag{
  position:absolute;
  left:0; right:0;
  bottom:18px;
  text-align:center;
  font-weight:900;
  letter-spacing:.20em;
  opacity:.85;
  text-shadow:0 10px 28px rgba(0,0,0,.75);
  pointer-events:none;
}

/* GIRL SELECT：顔が見えるように全体を下へ */
#girlScreen .overlay{
  justify-content:flex-start;
  align-items:flex-start;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-top:clamp(250px, 34vh, 360px);
  padding-bottom:24px;
}
#girlScreen .panel{
  background:rgba(0,0,0,.14);
  border-radius:18px;
  padding:14px 10px 18px;
  backdrop-filter: blur(2px);
}
.gridIcons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:12px;
  margin:14px auto 18px;
  width:min(520px, 100%);
}
.girlTile{
  position:relative;
  border-radius:16px;
  overflow:hidden;
  background:rgba(255,255,255,.08);
  border:2px solid rgba(255,255,255,.00);
  padding:10px;
  text-align:left;
  -webkit-tap-highlight-color:transparent;
}
.girlTile.active{ border-color:var(--stroke); background:rgba(255,255,255,.12); }
.girlTile.locked{ opacity:.90; border-color:rgba(255,255,255,.10); }

.iconBox{
  width:100%;
  aspect-ratio:1/1;
  border-radius:var(--iconRadius);
  overflow:hidden;
  background:rgba(0,0,0,.25);
  position:relative;
}
.iconBox::before{
  content:"";
  position:absolute; inset:0;
  border-radius:var(--iconRadius);
  box-shadow: inset 0 0 0 var(--iconFrame) rgba(255,255,255,.92);
  pointer-events:none;
}
.iconBox img{
  width:100%;
  height:100%;
  object-fit:cover;
  display:block;
}
.girlName{
  margin-top:10px;
  font-weight:900;
  letter-spacing:.10em;
  font-size:13px;
  opacity:.95;
}
.lockBadge{
  position:absolute;
  top:10px; right:10px;
  padding:6px 10px;
  border-radius:999px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.25);
  font-size:11px;
  font-weight:900;
  letter-spacing:.08em;
}
.rowBtns{
  display:flex;
  gap:12px;
  justify-content:center;
  align-items:center;
  flex-wrap:nowrap;
  margin-top:10px;
}
.rowBtns .bigBtn{ width:auto; flex:1; max-width:220px; }

/* MODE */
#modeScreen .overlay{
  justify-content:flex-start;
  align-items:flex-start;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding-top:clamp(160px, 26vh, 260px);
  padding-bottom:24px;
}
.modeBtns{
  display:flex;
  flex-direction:column;
  gap:12px;
  width:min(360px, 92%);
  margin:0 auto;
}
.modeBtn{
  font-size:18px;
  padding:16px 18px;
  border:none;
  border-radius:16px;
  background:#ffffff22;
  color:#fff;
  font-weight:900;
}
.smallBack{
  margin-top:14px;
  font-size:12px;
  font-weight:900;
  letter-spacing:.12em;
  opacity:.9;
  text-decoration:underline;
  background:transparent;
  border:none;
  color:#fff;
}

/* GAME */
#gameScreen .overlay{
  flex-direction:column;
  justify-content:flex-start;
  padding-bottom:calc(env(safe-area-inset-bottom) + 16px + 130px);
}
#gameScreen.chee .bg{transform:scale(1.12)}
#gameScreen.hold .bg{filter:brightness(.92)}
#gameScreen .choices{
  position:absolute;
  left:16px;
  right:16px;
  bottom:calc(env(safe-area-inset-bottom) + 16px);
}
.vignette{
  position:absolute;inset:0;
  pointer-events:none;
  opacity:0;
  background:radial-gradient(circle, rgba(0,0,0,0) 45%, rgba(0,0,0,.45) 100%);
  transition:opacity .25s;
}
#gameScreen.chee .vignette{opacity:1}

.cut{ position:absolute;inset:0; background:#000; opacity:0; pointer-events:none; transition:opacity .28s; }
#gameScreen.cut .cut{opacity:1}

#gameScreen .announce{
  position:absolute;
  inset:0;
  display:flex;
  justify-content:center;
  align-items:center;
  font-weight:900;
  letter-spacing:.2em;
  text-shadow:0 10px 28px rgba(0,0,0,.85);
  pointer-events:none;
  opacity:0;
  transform:translateY(6px);
  transition:opacity .22s ease, transform .22s ease;
  z-index:50;
}
#gameScreen.announce .announce{
  opacity:1;
  transform:translateY(0);
}
#gameScreen .announce::before{
  content:"";
  position:absolute;
  width:min(420px, 86%);
  height:72px;
  border-radius:18px;
  background:rgba(0,0,0,.55);
  border:1px solid rgba(255,255,255,.18);
  backdrop-filter: blur(6px);
}
#gameScreen .announce > span{
  position:relative;
  z-index:1;
  font-size:26px;
}

.flash{ position:absolute; inset:0; background:rgba(255,255,255,.22); opacity:0; pointer-events:none; transition:opacity .08s ease-out; }
.flash.on{ opacity:1; }

.bubble{
  position:relative;
  background:rgba(255,255,255,.08);
  border-radius:14px;
  padding:14px;
  min-height:130px;
  overflow:visible;
}

#gameScreen{ isolation:isolate; }
#gameScreen .bg{ z-index:0; }
#gameScreen .vignette{ z-index:5; }
#gameScreen .overlay{ z-index:10; }
#gameScreen .cut{ z-index:20; }
#gameScreen .flash{ z-index:30; }
#gameScreen #resultBox{ z-index:45; }

.question{
  font-size:20px;
  font-weight:800;
  line-height:1.45;
  opacity:1;
  transition:opacity .22s;
  padding-bottom:62px;
}
.question.hide{opacity:0}

#speech{
  position:absolute;
  right:14px;
  bottom:10px;
  text-align:right;
  pointer-events:none;
  font-size:clamp(22px, 6vw, 34px);
  font-weight:900;
  letter-spacing:.10em;
  line-height:1.1;
  max-width:88%;
  white-space:pre-line;
  word-break:break-word;
  overflow:visible;
  text-shadow:0 10px 28px rgba(0,0,0,.75);
}
.cheeWord.big{ transform:scale(1.06); transform-origin:right bottom; }

.heartOnly{ color:#ff2d55; text-shadow:0 8px 22px rgba(255,45,85,.35); }
.heartGold{ color:#ffd54a; text-shadow:0 10px 26px rgba(255,213,74,.45); }
@keyframes heartPop{
  0%{ transform:scale(0.8); opacity:0; }
  55%{ transform:scale(1.25); opacity:1; }
  100%{ transform:scale(1); opacity:1; }
}
.heartPop{ animation:heartPop .22s ease-out; }

@keyframes bgShake {
  0%   { transform: translate(0, 0) scale(1.12); }
  20%  { transform: translate(-2px, 1px) scale(1.12); }
  40%  { transform: translate(2px, -1px) scale(1.12); }
  60%  { transform: translate(-1px, -2px) scale(1.12); }
  80%  { transform: translate(1px, 2px) scale(1.12); }
  100% { transform: translate(0, 0) scale(1.12); }
}
#gameScreen.chee.stage3plus .bg{ animation:bgShake .35s infinite; }

.choices{ display:grid; grid-template-columns:1fr 1fr; gap:10px; }

.choice{
  padding:14px;
  border:none;
  border-radius:12px;
  font-size:16px;
  font-weight:900;
  color:#fff;
}
.choice:disabled{opacity:.55}
.choices.chee10 .choice{ padding:12px; font-size:14px; border-radius:12px; }

.gauge{
  height:8px;
  background:#222;
  border-radius:999px;
  overflow:hidden;
  opacity:0;
  transform:translateY(8px);
  transition:opacity .16s, transform .16s;
  margin-bottom:10px;
}
.gauge.show{ opacity:1; transform:translateY(0); }
.gauge>div{
  height:100%;
  width:100%;
  transform-origin:left;
  transform:scaleX(0);
}
#gaugeBar.yellow{ background:linear-gradient(90deg,#ffe259,#ffa751); }
#gaugeBar.red{ background:linear-gradient(90deg,#ff416c,#ff4b2b); }

#gameScreen.result #question{ display:none; }

#resultBox{
  position:absolute;
  left:16px; right:16px;
  bottom:135px;
  pointer-events:none;
  text-shadow:0 10px 28px rgba(0,0,0,.75);
}
#resultBox .label{
  font-size:18px;
  font-weight:900;
  letter-spacing:.10em;
  margin-bottom:12px;
}
#resultBox .pctRow{ display:flex; justify-content:flex-end; align-items:baseline; }
#resultBox .pct{ font-size:88px; font-weight:900; line-height:1; }
#resultBox .pct small{ font-size:20px; opacity:.95; margin-left:2px; }

#gameScreen.result .bubble{
  background:rgba(255,255,255,.90);
  border-radius:22px;
  padding:16px 18px;
  box-shadow:0 12px 30px rgba(0,0,0,.35);
  min-height:0;
  display:flex;
  justify-content:flex-end;
  align-items:flex-end;
}

#gameScreen.result #speech{
  position:static;
  margin:0 auto;
  text-align:center;
  font-size:20px;
  font-weight:900;
  letter-spacing:.06em;
  line-height:1.25;
  color:#111;
  text-shadow:none;
  max-width:100%;
  white-space:normal;
  pointer-events:none;
}

#gameScreen.result #speech .heartOnly{
  text-shadow:none;
}

@media (max-width:420px){
  #girlScreen .overlay{
    padding-top:clamp(220px, 30vh, 320px);
  }
  .girlName{
    font-size:12px;
    letter-spacing:.05em;
  }
}
</style>
</head>

<body>
<div class="app">
<header>
  <div>チーと言えばギュウと答える</div>
  <div id="counter">-</div>
</header>

<!-- TOP -->
<div id="topScreen" class="screen">
  <div class="bg"></div>
  <div class="overlay">
    <div class="panel">
      <h1 class="titleBig">ガチ！チー牛診断！！</h1>
      <button class="bigBtn" id="btnGoGirl">START</button>
    </div>
  </div>
  <div id="versionTag">VERSION <span id="versionVal"></span></div>
</div>

<!-- GIRL SELECT -->
<div id="girlScreen" class="screen hide">
  <div class="bg"></div>
  <div class="overlay">
    <div class="panel">
      <h1 class="titleBig">女の子を選んでね</h1>
      <div class="gridIcons" id="girlGrid"></div>
      <div class="rowBtns" style="margin-top:14px;">
        <button class="bigBtn" id="btnGirlBack">戻る</button>
        <button class="bigBtn" id="btnGoMode">次へ</button>
      </div>
    </div>
  </div>
</div>

<!-- MODE SELECT -->
<div id="modeScreen" class="screen hide">
  <div class="bg"></div>
  <div class="overlay">
    <div class="panel">
      <h1 class="titleBig">モードを選んでね</h1>
      <div class="subLine" id="bestLine">チー娘 BEST：ステージ0</div>

      <div class="modeBtns">
        <button class="modeBtn" id="btnStartQuiz">チー牛診断</button>
        <button class="modeBtn" id="btnStartChee">チー娘モード</button>

        <button class="modeBtn" id="btnQuizLen">🧩 出題数：45問</button>
        <div class="subLine" id="quizLenNote" style="margin-top:-4px; opacity:.9; display:none;">
          25問は課金で解放
        </div>

        <button class="modeBtn" id="btnToggleAllStar">⭐ オールスター：OFF</button>
        <div class="subLine" id="allStarNote" style="margin-top:-4px; opacity:.9;">
          オールスターは課金で解放
        </div>
      </div>

      <button class="smallBack" id="btnModeBack">女の子選択に戻る</button>
    </div>
  </div>
</div>

<!-- GAME -->
<div id="gameScreen" class="screen hide">
  <div class="bg"></div>
  <div class="vignette"></div>
  <div class="cut"></div>
  <div class="flash" id="flash"></div>
  <div class="announce"><span>チー娘登場！！</span></div>

  <div id="resultBox" class="hide">
    <div class="label">あなたのチー牛度は</div>
    <div class="pctRow"><div class="pct" id="resultPct">0<small>%</small></div></div>
  </div>

  <div class="overlay">
    <div class="bubble" id="bubble">
      <div id="question" class="question"></div>
      <div id="speech"></div>
    </div>

    <div class="gauge" id="gaugeWrap"><div id="gaugeBar"></div></div>
    <div class="choices" id="choices"></div>
  </div>
</div>
</div>

<script>
window.onerror = function (msg, src, line, col, err) {
  const text =
    "JS ERROR:\n" +
    msg + "\n" +
    "line: " + line + " col: " + col + "\n" +
    (err && err.stack ? err.stack : "") + "\n" +
    (src ? ("src: " + src) : "");

  let box = document.getElementById("errBox");
  if(!box){
    box = document.createElement("pre");
    box.id = "errBox";
    box.style.position = "fixed";
    box.style.left = "10px";
    box.style.right = "10px";
    box.style.bottom = "10px";
    box.style.maxHeight = "40vh";
    box.style.overflow = "auto";
    box.style.zIndex = "99999";
    box.style.background = "rgba(0,0,0,.88)";
    box.style.border = "2px solid rgba(255,0,0,.6)";
    box.style.padding = "10px";
    box.style.fontSize = "12px";
    box.style.whiteSpace = "pre-wrap";
    box.style.borderRadius = "12px";
    box.style.pointerEvents = "auto";
    box.style.userSelect = "text";
    box.onclick = ()=> box.remove();
    document.body.appendChild(box);
  }
  box.textContent = text;
  return true;
};

const DEBUG_GIFTED = true;
const DEBUG = true;

if (DEBUG) {
  window.onerror = function (msg, src, line, col, err) {
    const text =
      "JS ERROR:\n" +
      msg + "\n" +
      "line: " + line + " col: " + col + "\n" +
      (err && err.stack ? err.stack : "") + "\n" +
      (src ? ("src: " + src) : "");

    let box = document.getElementById("errBox");
    if (!box) {
      box = document.createElement("pre");
      box.id = "errBox";
      box.style.position = "fixed";
      box.style.left = "10px";
      box.style.right = "10px";
      box.style.bottom = "10px";
      box.style.maxHeight = "40vh";
      box.style.overflow = "auto";
      box.style.zIndex = "99999";
      box.style.background = "rgba(0,0,0,.88)";
      box.style.border = "2px solid rgba(255,0,0,.6)";
      box.style.padding = "10px";
      box.style.fontSize = "12px";
      box.style.whiteSpace = "pre-wrap";
      box.style.borderRadius = "12px";
      box.style.pointerEvents = "auto";
      box.style.userSelect = "text";
      box.onclick = () => box.remove();
      document.body.appendChild(box);
    }
    box.textContent = text;
    return true;
  };
}

/* =========================
   v3.0300 (8 image spec)
   1人あたり8枚
   icon 1 / top 1 / normal 3 / gameover 1 / chi_gameover 1 / score 2
========================= */
const APP_VERSION = "v3.0300";
document.getElementById("versionVal").textContent = APP_VERSION;

/* keys */
const CHEE_RECORD_KEY = "cheeGirlBestStage";
const GIRL_KEY = "selectedGirlKey";
const GIRL_PREVIEW_KEY = "girlPreviewBgKey";
const UNLOCK_KEY = "unlockedGirls";
const QUIZ_LEN_KEY = "quizLengthMode";
const QUIZ25_UNLOCK_KEY = "quiz25Unlocked";

/* storage helpers */
function getBestStage(){ return Number(localStorage.getItem(CHEE_RECORD_KEY)) || 0; }
function setBestStage(stage){ localStorage.setItem(CHEE_RECORD_KEY, String(stage)); }
function getSavedGirl(){ return localStorage.getItem(GIRL_KEY) || "A"; }
function saveGirl(g){ localStorage.setItem(GIRL_KEY, g); }
function getPreviewKey(){ return localStorage.getItem(GIRL_PREVIEW_KEY) || ""; }
function setPreviewKey(k){ localStorage.setItem(GIRL_PREVIEW_KEY, k); }

(function ensureUnlockedDefault(){
  if(!DEBUG) return;
  try{
    const cur = JSON.parse(localStorage.getItem(UNLOCK_KEY) || "[]");
    const base = Array.isArray(cur) ? cur : [];
    const need = ["A","B","C","D","E"];
    const merged = Array.from(new Set([...base, ...need]));
    localStorage.setItem(UNLOCK_KEY, JSON.stringify(merged));
  }catch(e){
    localStorage.setItem(UNLOCK_KEY, JSON.stringify(["A","B","C","D","E"]));
  }
})();

/* utils */
function shuffle(a){ return a.slice().sort(()=>Math.random()-0.5); }
function randInt(min, max){ return Math.floor(Math.random()*(max-min+1))+min; }
function pick(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function safePick(list, fallback){
  if(Array.isArray(list) && list.length) return pick(list);
  return fallback || "";
}

/* girls : 8枚仕様 */
function makeGirl(prefix, key, name, locked=false, chiOverText="……", replies={}, scoreText={}){
  const normal = [
    `${prefix}_normal_01.png`,
    `${prefix}_normal_02.png`,
    `${prefix}_normal_03.png`
  ];

  return {
    key, name, locked,
    icon: `${prefix}_icon.png`,                 // 1
    top: `${prefix}_top_01.png`,                // 1
    normal,                                     // 3
    gameover: `${prefix}_gameover_01.png`,      // 1
    chiGameover: `${prefix}_chi_gameover_01.png`, // 1
    chiOverText,
    score: {
      normal: `${prefix}_score_01.png`,         // 1
      gifted: `${prefix}_score_02.png`          // 1
    },
    scoreText: {
      normal: scoreText.normal ?? "",
      gifted: scoreText.gifted ?? ""
    },
    replies: {
      yes:  replies.yes  ?? "笑",
      no:   replies.no   ?? "クスッ",
      gyuu: replies.gyuu ?? "ニコッ",
      chi:  replies.chi  ?? "ギュウ"
    }
  };
}

function makeGirlLite(prefix, key, name){
  return {
    key, name, locked:true,
    icon: `${prefix}_icon.png`,
    top: `${prefix}_top_01.png`,
    normal: [],
    gameover: "",
    chiGameover: "",
    chiOverText: "（LOCKED）",
    score: {}
  };
}

const GIRLS = [
  makeGirl("girlA","A","Girl A", false, "……（チー娘Aは無言で去っていった）",
    { yes:"ふふ", no:"……", gyuu:"にこ", chi:"ギュウ" },
    {
      normal: "やっぱりチー牛だったね",
      gifted: "……あなた、チギュテッドだよ"
    }
  ),
  makeGirl("girlB","B","Girl B", false, "……（チー娘B：見なかったことにするね）",
    { yes:"うん", no:"ちがうよ", gyuu:"えへ", chi:"ギュウ" },
    {
      normal: "見た瞬間、チー牛だと思った",
      gifted: "これは別格。チギュテッドだね"
    }
  ),
  makeGirl("girlC","C","Girl C", false, "……（チー娘C：次はちゃんとして？）",
    { yes:"よし", no:"だめ", gyuu:"へへ", chi:"ギュウ" },
    {
      normal: "チー牛っぽいね",
      gifted: "すごっ…チギュテッドじゃん"
    }
  ),
  makeGirl("girlD","D","Girl D", false, "……（チー娘D：試運転中）",
    { yes:"ふーん", no:"まあね", gyuu:"にや", chi:"ギュウ" },
    {
      normal: "チー牛だと思う",
      gifted: "才能の塊。チギュテッド"
    }
  ),
  makeGirl("girlE","E","Girl E", false, "……（チー娘E：試運転中）",
    { yes:"OK", no:"NO", gyuu:"よし", chi:"ギュウ" },
    {
      normal: "やっぱチー牛だったか",
      gifted: "これはもう…チギュテッド"
    }
  ),
  makeGirlLite("girlF","F","Girl F")
];

function getGirlByKey(k){ return GIRLS.find(x=>x.key===k) || GIRLS[0]; }
let selectedGirlKey = getSavedGirl();
function getSelectedGirl(){ return getGirlByKey(selectedGirlKey); }

const ALLSTAR_ENABLED_KEY = "allStarEnabled";
let allStarUnlocked = DEBUG ? true : false;

let allStarBag = [];
let allStarLastKey = "";

function getUnlockedGirls(){
  try{
    const a = JSON.parse(localStorage.getItem(UNLOCK_KEY) || "[]");
    if(Array.isArray(a) && a.length) return a;
  }catch(e){}
  return ["A","B","C"];
}
function refillAllStarBag(){
  const keys = shuffle(getAllStarKeysAvailable());
  allStarBag = keys;
  if(allStarBag.length >= 2 && allStarBag[0] === allStarLastKey){
    [allStarBag[0], allStarBag[1]] = [allStarBag[1], allStarBag[0]];
  }
}
function getAllStarKeysAvailable(){
  const unlocked = getUnlockedGirls();
  const keys = unlocked.filter(k=>{
    const g = getGirlByKey(k);
    return g && !g.locked && Array.isArray(g.normal) && g.normal.length > 0;
  });
  return keys.length ? keys : [getSavedGirl()];
}
function nextAllStarKey(){
  if(!allStarBag.length) refillAllStarBag();
  const k = allStarBag.shift();
  allStarLastKey = k || "";
  return k || getSavedGirl();
}
function setAllStarEnabled(next){
  allStarEnabled = !!next;
  try{ localStorage.setItem(ALLSTAR_ENABLED_KEY, allStarEnabled ? "1" : "0"); }catch(e){}
}
function toggleAllStarEnabled(){
  if(!allStarUnlocked){
    alert("オールスターモードは課金で解放されます");
    return;
  }
  setAllStarEnabled(!allStarEnabled);
}
function pickGirlForPlay(){
  if(!allStarEnabled) return getSelectedGirl();
  const k = nextAllStarKey();
  return getGirlByKey(k) || getSelectedGirl();
}

/* audio */
let audioCtx=null;
function ensureAudio(){
  if(!audioCtx){
    const AC = window.AudioContext || window.webkitAudioContext;
    audioCtx = new AC();
  }
  if(audioCtx.state === "suspended") audioCtx.resume();
}
function playPopSE(){
  try{
    ensureAudio();
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(660, t0);
    osc.frequency.exponentialRampToValueAtTime(880, t0 + 0.03);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.18, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.10);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.11);
  }catch(e){}
}
function flashBg(){
  flashEl.classList.add("on");
  setTimeout(()=> flashEl.classList.remove("on"), FLASH_ON_MS);
}
function playAnnounceSE(){
  try{
    ensureAudio();
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(740, t0);
    osc.frequency.exponentialRampToValueAtTime(1040, t0 + 0.06);
    gain.gain.setValueAtTime(0.0001, t0);
    gain.gain.exponentialRampToValueAtTime(0.22, t0 + 0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.18);
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + 0.20);
  }catch(e){}
}
function showCheeAnnounce(){
  locked = true;
  gameScreen.classList.add("announce");
  playAnnounceSE();
  tset(()=>{
    gameScreen.classList.remove("announce");
    locked = false;
  }, ANNOUNCE_SHOW_MS);
}

function buildChoicesChee10(){
  const decoys = [
    "はい","いいえ","チー","ポン","カン","ドン","モー","牛","チーズ","特盛り",
    "並","大盛り","湯気","ニコッ","クスッ","笑","うし","ぎゅ","チー牛","牛丼"
  ];
  const nine = shuffle(decoys.filter(x=>x!=="ギュウ")).slice(0, 9);
  let labels = ["ギュウ", ...nine];

  for(let k=0;k<10;k++){
    labels = shuffle(labels);
    const idx = labels.indexOf("ギュウ");
    if(idx !== lastGyuuIndex){ lastGyuuIndex = idx; break; }
  }

  choicesEl.classList.add("chee10");
  choicesEl.innerHTML="";
  labels.forEach(label=>{
    const b=document.createElement("button");
    b.textContent = label;
    b.className="choice";
    b.onclick=()=>answer(label);
    choicesEl.appendChild(b);
  });
  applyRandomColorsToButtons();
}

/* chee levels */
function pickCheeLevelNormal(){
  const r = Math.random();
  let acc = 0;
  for(const lv of cheeLevelsNormal){
    acc += lv.weight;
    if(r <= acc) return lv;
  }
  return cheeLevelsNormal[0];
}
function cheeOnlyPickStage(){
  let stage = cheeStage;
  if(Math.random() < 0.25) stage = Math.max(1, stage - (Math.random()<0.7 ? 1 : 2));
  const stars = stage <= 1 ? 1 : (stage === 2 ? 2 : 3);
  const base = 2400 - (stage - 1) * 120;
  const timeMs = Math.max(550, Math.round(base));
  const gaugeType = stars === 1 ? "cool" : (stars === 2 ? "yellow" : "red");
  return { stars, timeMs, gauge:gaugeType, stage };
}

/* chee spawn */
function maybeChee(){
  if(ended) return;

  if(i >= playQuestions.length-1){ endResult(); return; }

  if(!cheeCooldown && Math.random() < CHEE_RATE){
    cheeCooldown=true;
    setButtonsEnabled(false);
    gameScreen.classList.add("hold");
    setTimeout(()=>{
      gameScreen.classList.remove("hold");
      startCheeBattle(pickCheeLevelNormal());
    }, CHEE_PRE_HOLD_MS);
  }else{
    cheeCooldown=false;
    i++;
    if(i < playQuestions.length) showQuestion();
    else endResult();
  }
}

function startCheeBattle(level){
  if(ended) return;

  clearCheeTimeouts();
  resetCheeVisuals();

  mode="chee";
  locked=true;

  clearSpeech();
  speechEl.style.opacity = "0";
  showCheeAnnounce();

  const g = getPlayGirl();
  const list = (g.normal && g.normal.length) ? g.normal : [g.top];
  const bg = safePick(list, g.top);
  gameBg.style.backgroundImage = `url("${bg}")`;

  tset(()=>{
    if(ended) return;

    locked=false;
    gameScreen.classList.add("chee");
    if(level.stars >= 3) gameScreen.classList.add("stage3plus");
    gameScreen.classList.add("cut");

    tset(()=>{
      gameScreen.classList.remove("cut");

      tset(()=>{
        qEl.textContent="";
        qEl.classList.add("hide");
        clearSpeech();

        tset(()=>{
          speechEl.className = "cheeWord" + (level.stars>=3 ? " big" : "");
          speechEl.textContent = "チー！";
          speechEl.style.opacity = "1";

          if(gameMode === "cheeOnly") buildChoicesChee10();
          else buildChoices4();

          startCheeTimer(level);
          setButtonsEnabled(true);
        }, CHEE_SILENCE_MS);

      }, POST_CUT_HOLD_MS);

    }, CUT_MS);

  }, ANNOUNCE_SHOW_MS);
}

function startCheeTimer(level){
  stopCheeTimer();
  showGauge();

  gaugeBar.classList.remove("yellow","red");
  if(level.gauge === "yellow") gaugeBar.classList.add("yellow");
  if(level.gauge === "red") gaugeBar.classList.add("red");

  const start=performance.now();

  const tick=(t)=>{
    let elapsed = t - start;

    if(level.stars >= 3 && elapsed < STAGE3_BOOST_MS){
      elapsed = elapsed * STAGE3_BOOST_MULT;
    }else if(level.stars >= 3 && elapsed >= STAGE3_BOOST_MS){
      const boosted = STAGE3_BOOST_MS * STAGE3_BOOST_MULT;
      elapsed = boosted + (elapsed - STAGE3_BOOST_MS);
    }

    const r = Math.max(0, 1 - (elapsed / level.timeMs));
    gaugeBar.style.transform = `scaleX(${r})`;

    if(level.gauge === "cool"){
      gaugeBar.style.background = `hsl(${210 * r}, 85%, 55%)`;
    }

    if(r > 0){
      rafId = requestAnimationFrame(tick);
    }else{
      gameOver(true);
    }
  };

  rafId = requestAnimationFrame(tick);
}

function nextCheeOnlyAfterWin(){
  cheeStage++;
  counterEl.textContent = `ステージ${cheeStage}`;

  const best = getBestStage();
  if(cheeStage > best){
    setBestStage(cheeStage);
    isNewRecordRun = true;
  }

  if(allStarEnabled){
    setPlayGirl(pickGirlForPlay());
  }

  startCheeBattle(cheeOnlyPickStage());
}

/* answer */
function answer(t){
  if(locked || ended) return;
  locked=true;
  setButtonsEnabled(false);

  ensureAudio();
  qEl.classList.add("hide");

  if(mode==="chee"){
    if(t==="ギュウ"){
      stopCheeTimer();
      hideGauge();

      setTimeout(()=> setHeartOnlyPop(isNewRecordRun), GIRL_REPLY_DELAY_MS);

      setTimeout(()=>{
        resetCheeVisuals();

        if(gameMode === "cheeOnly"){
          nextCheeOnlyAfterWin();
          return;
        }

        i++;
        if(i < playQuestions.length) showQuestion();
        else endResult();
      }, GIRL_REPLY_DELAY_MS + CHEE_SUCCESS_HOLD_MS);

    }else{
      gameOver(true);
    }
    return;
  }

  const isLast = (i === playQuestions.length - 1);

  setTimeout(()=>{
    const g = getPlayGirl();
    if(t==="はい")        setTextWithHeart(g.replies.yes);
    else if(t==="いいえ") setTextWithHeart(g.replies.no);
    else if(t==="ギュウ") setTextWithHeart(g.replies.gyuu);
    else if(t==="チー")   setGyuuWithHeart();
    else                  setTextWithHeart(g.replies.yes);
  }, GIRL_REPLY_DELAY_MS);

  setTimeout(()=>{
    if(isLast){
      if(t !== "ギュウ"){ gameOver(false); return; }
      endResult();
      return;
    }
    maybeChee();
  }, GIRL_REPLY_DELAY_MS + NORMAL_REACT_MS);
}

/* end buttons */
function renderEndButtonsDelayed(delayMs){
  choicesEl.innerHTML = "";
  setTimeout(()=>{
    choicesEl.innerHTML = `
      <button class="choice" style="grid-column:1/-1" onclick="restart(gameMode)">もう一回</button>
      <button class="choice" style="grid-column:1/-1" onclick="goTop()">トップに戻る</button>
    `;
    applyRandomColorsToButtons();
  }, delayMs);
}

/* =========================
   CHIGYUTED ENDING
========================= */
let giftedMode = false;
let giftedStep = 0;
let giftedGirl = null;

function getGiftedScript(g){
  return [
    { q: "……ちょっと待って。", a: ["はい","いいえ","チー","ギュウ"] },
    { q: "今、100%出たって…わかってる？", a: ["はい","いいえ","チー","ギュウ"] },
    { q: "一応確認。チーと言えば？", a: ["はい","いいえ","チー","ギュウ"], correct:"ギュウ" },
    { q: "……うん。あなたは", a: ["はい","いいえ","チー","ギュウ"] },
    { q: "チー牛ギフテッド（チギュテッド）だよ❤", a: ["はい","いいえ","チー","ギュウ"] }
  ];
}
function renderGiftedChoices(labels){
  choicesEl.classList.remove("chee10");
  choicesEl.innerHTML = "";
  labels.forEach(label=>{
    const b = document.createElement("button");
    b.textContent = label;
    b.className = "choice";
    b.onclick = ()=> giftedAnswer(label);
    choicesEl.appendChild(b);
  });
  applyRandomColorsToButtons();
  setButtonsEnabled(true);
}
function startGiftedEnding(g){
  giftedMode = true;
  giftedStep = 0;
  giftedGirl = g;
  setButtonsEnabled(true);

  const script = getGiftedScript(giftedGirl);
  clearSpeech();
  setTextWithHeart(script[0].q);
  renderGiftedChoices(script[0].a);
}
function giftedAnswer(t){
  if(!giftedMode) return;

  const script = getGiftedScript(giftedGirl);
  const cur = script[giftedStep];

  if(cur && cur.correct && t !== cur.correct){
    clearSpeech();
    setSpeechPlain("……");
    setTimeout(()=>{
      clearSpeech();
      setTextWithHeart(cur.q);
    }, 450);
    return;
  }

  giftedStep++;
  if(giftedStep >= script.length){
    giftedMode = false;
    renderEndButtonsDelayed(0);
    return;
  }

  const next = script[giftedStep];
  clearSpeech();
  setTextWithHeart(next.q);
  renderGiftedChoices(next.a);
}

/* result */
function animatePercent(to){
  const dur = 900;
  const start = performance.now();
  const from = 0;

  const tick = (t)=>{
    const p = Math.min(1, (t-start)/dur);
    const eased = 1 - Math.pow(1-p, 3);
    const v = Math.round(from + (to-from)*eased);
    resultPct.innerHTML = `${Math.min(100,v)}<small>%</small>`;
    if(p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

function endResult(){
  ended=true;
  mode="result";
  resetCheeVisuals();

  gameScreen.classList.add("result");
  resultBox.classList.remove("hide");

  const g = getSelectedGirl();
  const score = rollScore();
  const rank = rankFromScore(score);

  let img = g.top;
  let line = "";

  if(score === 100){
    img = (g.score && g.score.gifted) ? g.score.gifted : g.top;
    line = (g.scoreText && g.scoreText.gifted) ? g.scoreText.gifted : "";
  }else{
    img = (g.score && g.score.normal) ? g.score.normal : g.top;
    line = (g.scoreText && g.scoreText.normal) ? g.scoreText.normal : "";
  }

  gameBg.style.backgroundImage = `url("${img}")`;

  qEl.textContent="";
  clearSpeech();
  speechEl.style.opacity = "1";
  counterEl.textContent = "RESULT";

  resultPct.innerHTML = `0<small>%</small>`;
  animatePercent(score);

  if(line && score !== 100){
    setTimeout(()=> setTextWithHeart(line), 520);
  }

  if(score === 100){
    startGiftedEnding(g);
  }else{
    renderEndButtonsDelayed(0);
  }
}

/* game over */
function gameOver(isCheeBattle){
  ended=true;
  resetCheeVisuals();

  gameScreen.classList.remove("result");
  resultBox.classList.add("hide");

  const g = getSelectedGirl();

  if(gameMode === "cheeOnly"){
    const reachedStage = cheeStage;
    const bestStage = getBestStage();

    if(reachedStage > bestStage){
      setBestStage(reachedStage);
      isNewRecordRun = true;
    }

    if(g.chiGameover) gameBg.style.backgroundImage = `url("${g.chiGameover}")`;
    clearSpeech();
    setSpeechPlain(g.chiOverText || "……");

    counterEl.textContent = `GAME OVER（ステージ${reachedStage}）`;
    renderEndButtonsDelayed(1000);
    return;
  }

  if(g.gameover) gameBg.style.backgroundImage = `url("${g.gameover}")`;
  clearSpeech();
  setSpeechPlain("あなたチー牛じゃなかったのね。。");
  counterEl.textContent = "GAME OVER";
  renderEndButtonsDelayed(1000);
}

/* restart */
function restart(modeName){
  ended=false;
  cheeCooldown=false;
  mode="quiz";
  locked=false;
  stopCheeTimer();
  resetCheeVisuals();

  gameMode = modeName || "quiz";
  isNewRecordRun = false;
  playGirl = null;
  giftedMode = false;
  giftedStep = 0;
  giftedGirl = null;

  gameScreen.classList.remove("result");
  resultBox.classList.add("hide");

  showOnly(gameScreen);

  if(gameMode === "cheeOnly") playQuestions = [];

  if(gameMode === "cheeOnly"){
    cheeStage = 1;
    lastGyuuIndex = -1;
    counterEl.textContent = `ステージ${cheeStage}`;
    setPlayGirl(pickGirlForPlay());
    startCheeBattle(cheeOnlyPickStage());
  }else{
    i=0;
    playQuestions = makePlayQuestions();
    showQuestion();
  }
}
